<h1>Subir artículo</h1>

<label>Título</label>
<input id="titulo">

<label>Tipo</label>
<select id="tipo">
  <option value="libros">Libro</option>
  <option value="videos">Video</option>
  <option value="audios">Audio</option>
  <option value="guias">Guía</option>
</select>

<label>Autor</label>
<input id="autor">

<label>Categoría</label>
<input id="categoria">

<label>Descripción</label>
<textarea id="descripcion"></textarea>

<label>Archivo principal</label>
<input type="file" id="archivo">

<label>Video (opcional)</label>
<input type="file" id="video">

<label>Audio (opcional)</label>
<input type="file" id="audio">

<label>Imagen</label>
<input type="file" id="imagen">

<button onclick="subir()">Subir</button>

<script>
function toBase64(file){
  return new Promise((res, rej)=>{
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function subir(){

  const titulo = document.getElementById("titulo").value;
  const tipo = document.getElementById("tipo").value;
  const autor = document.getElementById("autor").value;
  const categoria = document.getElementById("categoria").value;
  const descripcion = document.getElementById("descripcion").value;

  const id = titulo
  .toLowerCase()
  .replace(/\s+/g, "_")
  .replace(/[^a-z0-9_]/g, "");

  const archivo = document.getElementById("archivo").files[0];
  const video = document.getElementById("video").files[0];
  const audio = document.getElementById("audio").files[0];
  const imagen = document.getElementById("imagen").files[0];

  const payload = {
    tipo,
    id,
    titulo,
    autor,
    categoria,
    descripcion,
    archivo: archivo ? await toBase64(archivo) : "",
    video: video ? await toBase64(video) : "",
    audio: audio ? await toBase64(audio) : "",
    imagen: imagen ? await toBase64(imagen) : ""
  };

  await fetch("https://api.github.com/repos/TU_USUARIO/EduLibre/actions/workflows/upload.yml/dispatches", {
    method: "POST",
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": "Bearer TU_TOKEN",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      ref: "main",
      inputs: payload
    })
  });

  alert("Subida enviada");
}
</script>
