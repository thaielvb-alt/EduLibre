<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Subir</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center">Subir contenido</h1>

<div class="panel">

  <input id="titulo" placeholder="Título">

  <select id="tipo">
    <option value="libros">Libro</option>
    <option value="videos">Video</option>
    <option value="audios">Audio</option>
    <option value="guias">Guía</option>
  </select>

  <input id="autor" placeholder="Autor">
  <input id="categoria" placeholder="Categoría">
  <textarea id="descripcion" placeholder="Descripción"></textarea>

  <label>Archivo</label>
  <input type="file" id="archivo">

  <label>Video</label>
  <input type="file" id="video">

  <label>Audio</label>
  <input type="file" id="audio">

  <label>Imagen</label>
  <input type="file" id="imagen">

  <button onclick="subir()">Subir</button>

</div>

<script>
function toBase64(file){
  return new Promise(res=>{
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.readAsDataURL(file);
  });
}

async function subir(){

  const titulo = document.getElementById("titulo").value;
  const tipo = document.getElementById("tipo").value;
  const autor = document.getElementById("autor").value;
  const categoria = document.getElementById("categoria").value;
  const descripcion = document.getElementById("descripcion").value;

  const id = titulo.toLowerCase().replace(/\s+/g,"_");

  const archivo = document.getElementById("archivo").files[0];
  const video = document.getElementById("video").files[0];
  const audio = document.getElementById("audio").files[0];
  const imagen = document.getElementById("imagen").files[0];

  await fetch("https://api.github.com/repos/thaielvb-alt/EduLibre/actions/workflows/upload.yml/dispatches", {
    method:"POST",
    headers:{
      "Accept":"application/vnd.github+json",
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      ref:"main",
      inputs:{
        tipo,
        id,
        titulo,
        autor,
        categoria,
        descripcion,
        archivo: archivo ? await toBase64(archivo) : "",
        video: video ? await toBase64(video) : "",
        audio: audio ? await toBase64(audio) : "",
        imagen: imagen ? await toBase64(imagen) : ""
      }
    })
  });

  alert("Subida enviada, espera Actions");
}
</script>

</body>
</html>
