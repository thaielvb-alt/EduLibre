<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<h1 style="text-align:center">Subir contenido</h1>

<div class="panel">

  <input id="titulo" placeholder="Título">

  <select id="tipo">
    <option value="libros">Libro</option>
    <option value="videos">Video</option>
    <option value="audios">Audio</option>
    <option value="guias">Guía</option>
  </select>

  <input id="autor" placeholder="Autor">
  <input id="categoria" placeholder="Categoría">
  <textarea id="descripcion" placeholder="Descripción"></textarea>

  <label>Archivo</label>
  <input type="file" id="archivo">

  <label>Video</label>
  <input type="file" id="video">

  <label>Audio</label>
  <input type="file" id="audio">

  <label>Imagen</label>
  <input type="file" id="imagen">

  <button onclick="subir()">Subir</button>

</div>

<script>
async function subir(){

  const titulo = document.getElementById("titulo").value;
  const tipo = document.getElementById("tipo").value;
  const autor = document.getElementById("autor").value;
  const categoria = document.getElementById("categoria").value;
  const descripcion = document.getElementById("descripcion").value;

  const id = titulo.toLowerCase().replace(/\s+/g,"_");

  const body = `
UPLOAD
tipo: ${tipo}
id: ${id}
titulo: ${titulo}
autor: ${autor}
categoria: ${categoria}
descripcion: ${descripcion}
`;

  await fetch("https://api.github.com/repos/thaielvb-alt/EduLibre/issues", {
    method: "POST",
    headers: {
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: "UPLOAD:" + titulo,
      body: body
    })
  });

  alert("Subida enviada ✔");
}
</script>

</body>
</html>
