<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lector</title>
</head>
<body>

<h2>Cargando PDF...</h2>

<script>

const pdf =
localStorage.getItem("pdfActual");

if(!pdf){

    document.body.innerHTML =
    "<h2>No se encontró el PDF.</h2>";

}else{

    location.href =
    "pdfjs/web/viewer.html?file=" +
    encodeURIComponent(pdf);

}

</script>

</body>
</html>
