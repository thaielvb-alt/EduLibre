<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Audios</title>

<link rel="stylesheet"
href="style.css">

</head>


<body>


<nav>

<h1>🎧 Audios</h1>

</nav>



<main id="contenido"></main>




<script>


async function cargar(){


const audios =

await fetch(
"datos/audios.json"
)

.then(r=>r.json());



const contenido =

document.getElementById(
"contenido"
);



audios.forEach(item=>{


contenido.innerHTML += `


<div class="card">


<img

src="${item.imagen}"

onerror="
this.src='imagenes/default.png'
"

>


<div class="card-content">


<h3>
${item.titulo}
</h3>


<p>
${item.descripcion}
</p>



<audio controls>


<source

src="${item.archivo}"

type="audio/mpeg"

>


</audio>



</div>


</div>



`;



});


}



cargar();



</script>


</body>

</html>
