<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Audios</title>

<link rel="stylesheet"
href="style.css">

</head>


<body>


<nav>

<h1>🎧 Audios</h1>

</nav>



<main id="contenido"></main>




<script>


let audiosGlobal=[];



async function iniciar(){


audiosGlobal =

await fetch(
"datos/audios.json"
)

.then(r=>r.json());



const contenido =
document.getElementById(
"contenido"
);



audiosGlobal.forEach(item=>{


contenido.innerHTML += `


<div class="card">



<img

src="${item.imagen}"

onerror="
this.src='imagenes/default.png'
"

>



<div class="card-content">


<h3>
${item.titulo}
</h3>



<p>
${item.descripcion}
</p>




<audio controls>


<source

src="${item.archivo}"

type="audio/mpeg"

>


Tu navegador no soporta audio.


</audio>




<button

class="btn"

onclick="abrir('${item.id}')"

>

Ver más

</button>



</div>


</div>



`;



});


}





function abrir(id){


const audio =

audiosGlobal.find(
x=>x.id==id
);



localStorage.setItem(

"libroActual",

JSON.stringify(audio)

);



location.href=
"articulo.html";

}



iniciar();



</script>



</body>

</html>
