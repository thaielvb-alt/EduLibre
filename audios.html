<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<h1>🎧 Audios</h1>
</nav>

<main id="contenido"></main>

<script>

async function cargar(){

const audios =
await fetch(
"datos/audios.json"
)
.then(r=>r.json());

const contenido =
document.getElementById(
"contenido"
);

videos.forEach(item=>{

contenido.innerHTML += `

<div class="card">

<img src="${item.imagen}">

<div class="card-content">

<h3>${item.titulo}</h3>

<p>${item.descripcion}</p>

<button
class="btn"
onclick="abrir('${item.id}')">

Ver

</button>

</div>

</div>

`;

});

}

async function abrir(id){

const audios =
await fetch(
"datos/audios.json"
)
.then(r=>r.json());

const audio =
audios.find(
x=>x.id===id
);

localStorage.setItem(
"libroActual",
JSON.stringify(audio)
);

location.href =
"articulo.html";

}

cargar();

</script>

</body>
</html>
