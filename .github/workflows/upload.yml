name: Subir contenido EduLibre

on:
  workflow_dispatch:
    inputs:
      titulo:
        required: true
      autor:
        required: true
      descripcion:
        required: true
      categoria:
        required: true
      imagen:
        required: false
      pdf:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Actualizar biblioteca.json
        run: node scripts/update.js
        env:
          TITULO: ${{ inputs.titulo }}
          AUTOR: ${{ inputs.autor }}
          DESCRIPCION: ${{ inputs.descripcion }}
          CATEGORIA: ${{ inputs.categoria }}
          IMAGEN: ${{ inputs.imagen }}
          PDF: ${{ inputs.pdf }}

      - name: Commit cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Nuevo contenido agregado" || echo "sin cambios"
          git push