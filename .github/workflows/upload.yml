name: EduLibre Upload

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse issue
        run: node scripts/from-issue.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "upload content" || exit 0
          git push