name: Subir contenido EduLibre

on:
  workflow_dispatch:
    inputs:
      tipo:
        required: true
      titulo:
        required: true
      autor:
        required: true
      descripcion:
        required: true
      archivo:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Ejecutar update
        run: node scripts/update.js
        env:
          TIPO: ${{ inputs.tipo }}
          TITULO: ${{ inputs.titulo }}
          AUTOR: ${{ inputs.autor }}
          DESCRIPCION: ${{ inputs.descripcion }}
          ARCHIVO: ${{ inputs.archivo }}

      - name: Commit cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Nuevo contenido ${{ inputs.tipo }}" || echo "sin cambios"
          git push