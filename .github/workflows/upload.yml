name: EduLibre Upload

on:
  workflow_dispatch:
    inputs:
      tipo:
        required: true
      id:
        required: true
      titulo:
        required: true
      autor:
        required: true
      categoria:
        required: true
      descripcion:
        required: true
      archivo:
        required: false
      video:
        required: false
      audio:
        required: false
      imagen:
        required: false

jobs:
  upload:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run upload script
        run: node scripts/update.js
        env:
          INPUT_TIPO: ${{ inputs.tipo }}
          INPUT_ID: ${{ inputs.id }}
          INPUT_TITULO: ${{ inputs.titulo }}
          INPUT_AUTOR: ${{ inputs.autor }}
          INPUT_CATEGORIA: ${{ inputs.categoria }}
          INPUT_DESCRIPCION: ${{ inputs.descripcion }}
          INPUT_ARCHIVO: ${{ inputs.archivo }}
          INPUT_VIDEO: ${{ inputs.video }}
          INPUT_AUDIO: ${{ inputs.audio }}
          INPUT_IMAGEN: ${{ inputs.imagen }}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "upload content"
          git push