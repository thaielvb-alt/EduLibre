name: EduLibre Upload System

on:
  workflow_dispatch:
    inputs:
      tipo:
        required: true
      titulo:
        required: true
      autor:
        required: true
      categoria:
        required: true
      descripcion:
        required: true
      imagen:
        required: false
      pdf:
        required: false
      audio:
        required: false
      video:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Update JSON
        run: node scripts/update.js
        env:
          TIPO: ${{ inputs.tipo }}
          TITULO: ${{ inputs.titulo }}
          AUTOR: ${{ inputs.autor }}
          CATEGORIA: ${{ inputs.categoria }}
          DESCRIPCION: ${{ inputs.descripcion }}
          IMAGEN: ${{ inputs.imagen }}
          PDF: ${{ inputs.pdf }}
          AUDIO: ${{ inputs.audio }}
          VIDEO: ${{ inputs.video }}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Nuevo contenido ${{ inputs.tipo }}" || echo "sin cambios"
          git push